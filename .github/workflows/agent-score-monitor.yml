name: Agent Score Monitor

# Layer 2 of the AI-readiness guardrail: watches the *live* Fern Agent Score of
# production and fails (→ notifies repo watchers) if it drops below a floor.
#
# This is intentionally separate from agent-score-ci.yml: that job is a
# deterministic PR gate on source invariants, this one tracks the real,
# externally-measured score on a schedule so a regression in content (not just
# config) is still caught. Run it manually any time from the Actions tab.

on:
  schedule:
    # Mondays 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit'
        required: false
        default: 'https://build.avax.network/'
      threshold:
        description: 'Minimum acceptable score (0-100)'
        required: false
        default: '88'

permissions:
  contents: read

jobs:
  audit:
    name: afdocs score
    runs-on: ubuntu-latest
    env:
      URL: ${{ github.event.inputs.url || 'https://build.avax.network/' }}
      THRESHOLD: ${{ github.event.inputs.threshold || '88' }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Run afdocs and enforce the score floor
        run: |
          set -o pipefail
          echo "Auditing ${URL} (floor ${THRESHOLD})"

          # afdocs prints a human-readable report; --verbose adds per-URL detail.
          # We don't fail on the tool's own exit code (it may exit non-zero just
          # for warnings) — we parse the headline score ourselves.
          npx --yes afdocs check "${URL}" --verbose 2>&1 | tee afdocs.out || true

          # Headline score is reported as "NN/100". If the tool's output format
          # changes, this parse may need updating — warn rather than false-alarm.
          score="$(grep -oE '[0-9]{1,3}/100' afdocs.out | head -1 | cut -d/ -f1)"

          {
            echo "## Agent Score"
            echo ""
            echo "- URL: \`${URL}\`"
            echo "- Floor: \`${THRESHOLD}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -z "${score}" ]; then
            echo "::warning::Could not parse a score from afdocs output — tool format may have changed. Not failing."
            echo "- Result: ⚠️ score not parseable" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "- Score: \`${score}/100\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Agent Score: ${score}/100 (floor ${THRESHOLD})"

          if [ "${score}" -lt "${THRESHOLD}" ]; then
            echo "::error::Agent Score ${score} is below the ${THRESHOLD} floor — see the afdocs output above for the failing checks."
            echo "- Result: ❌ below floor" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✓ Agent Score ${score} ≥ ${THRESHOLD}"
          echo "- Result: ✅ above floor" >> "$GITHUB_STEP_SUMMARY"
