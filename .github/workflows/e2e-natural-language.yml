# Natural Language E2E Tests with Claude Code
#
# This workflow uses Claude Code + Playwright MCP to execute E2E tests
# written in natural language against the BuilderHub Console.
#
# Tests are defined in: tests/e2e-natural-language/
# See: tests/e2e-natural-language/manifest.yaml for test configuration

name: Natural Language E2E Tests

on:
  # Run on PRs to master
  pull_request:
    branches: [master, main]
    paths:
      - 'app/console/**'
      - 'components/console/**'
      - 'components/toolbox/**'
      - 'tests/e2e-natural-language/**'
      - '.github/workflows/e2e-natural-language.yml'

  # Run on push to master (for post-merge verification)
  push:
    branches: [master, main]
    paths:
      - 'app/console/**'
      - 'components/console/**'

  # Allow manual trigger with suite selection
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - wallet-flows
          - multi-step
          - all
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  BASE_URL: 'http://localhost:3000'

jobs:
  # ============================================================================
  # Smoke Tests (No Wallet Required)
  # ============================================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.test_suite == 'smoke' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Setup mock wallet extension
        run: node scripts/download-core-wallet.mjs

      - name: Build application
        run: yarn build
        env:
          NEXT_PUBLIC_TESTNET: 'true'

      - name: Start application
        run: |
          yarn start &
          npx wait-on ${{ env.BASE_URL }} --timeout 120000
        env:
          PORT: 3000

      - name: Generate test prompts
        run: node scripts/e2e-nl-orchestrator.mjs --suite smoke --output ./test-results

      - name: Run tests with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You are running E2E tests for the BuilderHub Console.

            ## Instructions
            1. Read the test manifest at tests/e2e-natural-language/manifest.yaml
            2. Execute the "smoke" test suite
            3. For each test in smoke/dashboard.test.md and smoke/navigation.test.md:
               - Navigate to the specified URLs
               - Execute the steps using Playwright MCP tools
               - Verify expected results
               - Take screenshots at key points
            4. Generate a summary report

            ## Base URL
            http://localhost:3000

            ## Tools to Use
            - browser_navigate: Go to URLs
            - browser_snapshot: Get page state before interactions
            - browser_click: Click elements (use ref from snapshot)
            - browser_wait_for: Wait for content
            - browser_take_screenshot: Capture screenshots

            ## Output
            Write results to:
            - test-results/reports/summary.md
            - test-results/status.json

            Begin by navigating to http://localhost:3000/console and taking a snapshot.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: 'mcp__playwright__*,Read,Write,Bash(ls:*),Bash(cat:*)'
          timeout_minutes: 10
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            test-results/
            screenshots/
          retention-days: 14

      - name: Post results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = './test-results/reports/summary.md';

            let body = '## 🧪 Natural Language E2E Test Results\n\n';
            body += '**Suite:** smoke\n';
            body += '**Status:** ';

            try {
              const statusPath = './test-results/status.json';
              if (fs.existsSync(statusPath)) {
                const status = JSON.parse(fs.readFileSync(statusPath, 'utf8'));
                body += status.status === 'passed' ? '✅ Passed' : '❌ Failed';
                body += `\n\n**Summary:** ${status.summary?.passed || 0} passed, ${status.summary?.failed || 0} failed\n`;
              } else {
                body += '⚠️ Results pending\n';
              }

              if (fs.existsSync(reportPath)) {
                const report = fs.readFileSync(reportPath, 'utf8');
                body += '\n<details>\n<summary>Full Report</summary>\n\n';
                body += report;
                body += '\n</details>\n';
              }
            } catch (e) {
              body += '⚠️ Could not read results\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ============================================================================
  # Wallet Flow Tests (Requires Wallet)
  # ============================================================================
  wallet-tests:
    name: Wallet Flow Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.test_suite == 'wallet-flows' || github.event.inputs.test_suite == 'all'
    needs: [smoke-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Setup wallet extension
        run: node scripts/download-core-wallet.mjs

      - name: Build application
        run: yarn build
        env:
          NEXT_PUBLIC_TESTNET: 'true'

      - name: Start application
        run: |
          yarn start &
          npx wait-on ${{ env.BASE_URL }} --timeout 120000

      - name: Setup wallet context
        run: node scripts/setup-wallet-context.mjs
        env:
          TEST_WALLET_MNEMONIC: ${{ secrets.TEST_WALLET_MNEMONIC }}

      - name: Generate test prompts
        run: node scripts/e2e-nl-orchestrator.mjs --suite wallet-flows --output ./test-results

      - name: Run wallet tests with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You are running wallet-dependent E2E tests for the BuilderHub Console.

            ## Instructions
            1. Read tests/e2e-natural-language/wallet-flows/faucet.test.md
            2. Execute each test case:
               - The wallet is pre-connected (mock Core Wallet)
               - Navigate to faucet page
               - Verify wallet address is visible
               - Test faucet interactions
            3. Generate results

            ## Base URL
            http://localhost:3000

            ## Wallet State
            - Mock wallet is injected
            - Address: 0x1234567890abcdef1234567890abcdef12345678
            - Network: Fuji testnet

            ## Output
            Write results to test-results/

            Start by navigating to http://localhost:3000/console/primary-network/faucet
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: 'mcp__playwright__*,Read,Write,Bash(ls:*)'
          timeout_minutes: 15
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wallet-test-results
          path: test-results/
          retention-days: 14

  # ============================================================================
  # Summary Job
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-tests, wallet-tests]
    if: always()

    steps:
      - name: Download smoke results
        uses: actions/download-artifact@v4
        with:
          name: smoke-test-results
          path: smoke-results
        continue-on-error: true

      - name: Download wallet results
        uses: actions/download-artifact@v4
        with:
          name: wallet-test-results
          path: wallet-results
        continue-on-error: true

      - name: Generate combined summary
        run: |
          echo "# Natural Language E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Smoke tests
          echo "### Smoke Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f smoke-results/status.json ]; then
            cat smoke-results/status.json | jq -r '"- Status: \(.status)\n- Passed: \(.summary.passed)\n- Failed: \(.summary.failed)"' >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: Not run or results unavailable" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Wallet tests
          echo "### Wallet Flow Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f wallet-results/status.json ]; then
            cat wallet-results/status.json | jq -r '"- Status: \(.status)\n- Passed: \(.summary.passed)\n- Failed: \(.summary.failed)"' >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: Not run or results unavailable" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for failures
        run: |
          FAILED=false

          if [ -f smoke-results/status.json ]; then
            STATUS=$(cat smoke-results/status.json | jq -r '.status')
            if [ "$STATUS" = "failed" ]; then
              FAILED=true
            fi
          fi

          if [ -f wallet-results/status.json ]; then
            STATUS=$(cat wallet-results/status.json | jq -r '.status')
            if [ "$STATUS" = "failed" ]; then
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo "One or more test suites failed"
            exit 1
          fi
