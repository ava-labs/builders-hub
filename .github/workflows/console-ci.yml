name: Console CI

on:
  pull_request:
    branches:
      - master
    paths:
      - 'components/toolbox/**'
      - 'app/console/**'
      - 'hooks/useConsoleNotifications.ts'
      - 'hooks/useEVMNotifications.ts'
      - 'hooks/usePChainNotifications.ts'
      - 'contracts/**'

concurrency:
  group: console-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

  lint:
    name: Lint Toolbox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint (toolbox rules)
        run: npx eslint components/toolbox/ --max-warnings 50

  conventions:
    name: Console Conventions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Folder naming (kebab-case)
        run: |
          errors=0
          for dir in $(find components/toolbox/console -mindepth 1 -type d \
            -not -path '*/node_modules/*' \
            -not -name 'shared' \
            -not -name 'steps' \
            -not -name 'components' \
            -not -name 'hooks' \
            -not -name 'sections'); do
            dirname=$(basename "$dir")
            if [[ "$dirname" =~ [A-Z] ]]; then
              echo "::error file=$dir::Folder '$dirname' must be kebab-case"
              errors=$((errors + 1))
            fi
          done
          [ $errors -eq 0 ] && echo "All console folders follow kebab-case." || exit 1

      - name: No direct wagmi useWalletClient in consumer code
        run: |
          violations=$(grep -rn "useWalletClient.*from.*['\"]wagmi['\"]" \
            components/toolbox/console/ \
            components/toolbox/components/ \
            components/toolbox/stores/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "::error::Use useResolvedWalletClient instead of wagmi's useWalletClient"
            echo "$violations"
            exit 1
          fi
          echo "No direct wagmi useWalletClient in consumer code."

      - name: No console.log in toolbox (outside catch blocks)
        run: |
          # Find console.log calls, exclude test files and catch blocks
          violations=$(grep -rn "console\.log" \
            components/toolbox/ \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules \
            --exclude-dir=__tests__ 2>/dev/null || true)
          count=$(echo "$violations" | grep -c "console.log" 2>/dev/null || echo "0")
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count console.log call(s) in toolbox code:"
            echo "$violations"
            # Warn but don't fail — use ESLint for enforcement
          else
            echo "No console.log in toolbox code."
          fi

      - name: Contract hooks use useContractActions
        run: |
          # Verify no hook directly imports old dependencies (should use useContractActions)
          violations=$(grep -rn "from 'viem/actions'" \
            components/toolbox/hooks/contracts/core/ \
            components/toolbox/hooks/contracts/governance/ \
            components/toolbox/hooks/contracts/staking/ \
            components/toolbox/hooks/contracts/bridge/ \
            components/toolbox/hooks/contracts/utilities/ \
            components/toolbox/hooks/contracts/precompiles/ \
            --include="*.ts" 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "::error::Contract hooks should use useContractActions instead of direct viem/actions imports"
            echo "$violations"
            exit 1
          fi
          echo "All contract hooks use useContractActions."

      - name: MDX imports match kebab-case paths
        run: |
          violations=$(grep -rn "toolbox/console/.*[A-Z].*/" \
            content/ \
            --include="*.mdx" 2>/dev/null | \
            grep -v "ValidatorManager\." | \
            grep "import" || true)
          if [ -n "$violations" ]; then
            echo "::error::MDX imports reference PascalCase folder paths — must use kebab-case"
            echo "$violations"
            exit 1
          fi
          echo "All MDX imports use kebab-case paths."
